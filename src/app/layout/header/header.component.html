<mat-toolbar color="primary" class="header-toolbar">

  <!-- Sidebar Toggle -->
  <button mat-icon-button (click)="toggleSidebar.emit()">
    <mat-icon>menu</mat-icon>
  </button>

  <!-- Title -->
  <span class="app-title">BRE Pratham 2.0</span>
  <span class="spacer"></span>

  <!-- Desktop Actions -->
  <div class="desktop-actions">

    <!-- Theme (Icon Button) -->
    <button mat-icon-button [matMenuTriggerFor]="themeMenu" matTooltip="Theme">
      <mat-icon>palette</mat-icon>
    </button>

    <mat-menu #themeMenu="matMenu" class="animated-menu">
      <app-theme-selector></app-theme-selector>
    </mat-menu>

    <!-- Notifications -->
    <button mat-icon-button [matMenuTriggerFor]="notifMenu" matBadge="3" matBadgeColor="warn">
      <mat-icon>notifications</mat-icon>
    </button>

    <mat-menu #notifMenu="matMenu" class="animated-menu">
      <div class="notif-container">
        <h4>Notifications</h4>

        <button mat-menu-item>
          <mat-icon>info</mat-icon>
          <span>New loan request</span>
        </button>

        <button mat-menu-item>
          <mat-icon>check_circle</mat-icon>
          <span>Profile approved</span>
        </button>

        <button mat-menu-item>
          <mat-icon>warning</mat-icon>
          <span>Pending documents</span>
        </button>
      </div>
    </mat-menu>

    <!-- Language -->
    <mat-form-field appearance="outline" class="lang-dropdown">
       🌐
      <mat-select
        [value]="languageService.getCurrentLang()"
        (selectionChange)="languageService.changeLanguage($event.value)">

        <mat-option value="en">🇬🇧 English</mat-option>
        <mat-option value="hi">🇮🇳 हिंदी</mat-option>
        <mat-option value="mr">🇮🇳 मराठी</mat-option>

      </mat-select>
    </mat-form-field>

    <!-- User -->
    <button mat-icon-button [matMenuTriggerFor]="userMenu">
      <mat-icon>account_circle</mat-icon>
    </button>

  </div>




  <!-- User Menu -->
  <mat-menu #userMenu="matMenu" class="animated-menu">
    <button mat-menu-item>
      <mat-icon>person</mat-icon>
      {{'PROFILE' | translate}}
    </button>

    <button mat-menu-item>
      <mat-icon>settings</mat-icon>
      {{'SETTINGS' | translate}}
    </button>

    <mat-divider></mat-divider>

    <button mat-menu-item>
      <mat-icon>logout</mat-icon>
      {{'LOGOUT' | translate}}
    </button>
  </mat-menu>

</mat-toolbar>
